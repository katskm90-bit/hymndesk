<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#E8650A">
<meta name="application-name" content="Lyric Hub">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lyric Hub">
<meta name="msapplication-TileColor" content="#E8650A">
<meta name="msapplication-TileImage" content="icons/icon-192.png">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Lyric Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* --- THEME VARIABLES --- */
:root {
  --bg: #ffffff; --bg2: #f8fafc; --bg3: #f1f5f9;
  --border: #e2e8f0; --border2: #cbd5e1;
  --text: #1e293b; --text2: #475569; --text3: #64748b; --text4: #94a3b8;
  --accent: #E8650A; --accent2: #d45a08; --accent-light: #FFF0E6; --accent-border: #FFD9B8;
  --card: #ffffff; --header: #ffffff; --modal: #ffffff;
  --input-bg: #f8fafc; --input-border: #e2e8f0;
  --shadow: rgba(0,0,0,0.05); --shadow2: rgba(0,0,0,0.12);
}
[data-theme="dark"] {
  --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
  --border: #334155; --border2: #475569;
  --text: #f1f5f9; --text2: #cbd5e1; --text3: #94a3b8; --text4: #64748b;
  --accent: #f97316; --accent2: #ea6a00; --accent-light: #1c1008; --accent-border: #7c3a0a;
  --card: #1e293b; --header: #0f172a; --modal: #1e293b;
  --input-bg: #334155; --input-border: #475569;
  --shadow: rgba(0,0,0,0.3); --shadow2: rgba(0,0,0,0.5);
}

*{box-sizing:border-box;margin:0;padding:0}
/* Mobile Speed Optimization: Disable tap delay and set smooth transitions */
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);transition:background 0.25s, color 0.25s; -webkit-tap-highlight-color:transparent; touch-action: manipulation;}
input,select,textarea,button{font-family:'Inter',sans-serif}

.app-header{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--header);position:sticky;top:0;z-index:50;gap:12px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:19px;height:19px;fill:#fff}
.logo-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:var(--text)}
.header-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.hymn-count{font-size:12px;color:var(--text3);font-weight:500;padding:4px 9px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;white-space:nowrap}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all 0.2s;white-space:nowrap;line-height:1}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border);color:var(--text)}
.btn-blue{background:linear-gradient(135deg,#4A5568,#374151);color:#fff}
.btn-green{background:linear-gradient(135deg,#10b981,#0d9488);color:#fff}
.btn-purple{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-red{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.btn-amber{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.btn-teal{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff}

#banner-section{position:relative;width:100%;background:#0f172a;overflow:hidden;display:none}
#banner-section.has-slides{display:block}
.banner-ratio{position:relative;width:100%;padding-bottom:25%;min-height:120px}
@media(max-width:768px){.banner-ratio{padding-bottom:40%}}
.banner-slide{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background-size:cover;background-position:center;text-decoration:none}
.banner-slide.active{display:flex}
.banner-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,0.55),rgba(0,0,0,0.2))}
.banner-headline{font-family:'Playfair Display',serif;font-size:clamp(16px,3vw,38px);font-weight:800;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.5);margin-bottom:6px;line-height:1.2}

.home-toolbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 8px;flex-wrap:wrap;gap:10px}
.home-toolbar h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text)}

.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;padding:8px 24px 24px}
.book-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 18px;cursor:pointer;transition:all 0.25s;box-shadow:0 1px 4px var(--shadow);position:relative;overflow:hidden}
.book-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.book-card:hover{transform:translateY(-3px);border-color:var(--accent-border);box-shadow:0 8px 24px var(--shadow2)}
.book-card-icon{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;margin-bottom:13px}
.book-card-icon svg{width:21px;height:21px;fill:#fff}
.book-card-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3}
.book-card-lang{font-size:12px;color:var(--accent2);font-weight:600;margin-bottom:9px}

.hymn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding:10px 24px 24px}
.hymn-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:15px;cursor:pointer;transition:all 0.22s;box-shadow:0 1px 3px var(--shadow); will-change: transform;}
.hymn-card:hover{transform:translateY(-2px);border-color:var(--accent-border);box-shadow:0 6px 20px var(--shadow2)}

.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.6);backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:14px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal-box{background:var(--modal);border:1px solid var(--border);border-radius:18px;padding:22px;width:100%;max-width:560px;margin:auto;position:relative;animation:slideIn 0.22s ease-out;box-shadow:0 20px 60px var(--shadow2)}

/* ... rest of your complex CSS remains the same ... */

#sync-banner{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--accent);color:#fff;font-size:12px;font-weight:600;text-align:center;padding:5px 12px;display:none;align-items:center;justify-content:center;gap:8px}
#sync-banner.show{display:flex}
.sync-spinner{width:13px;height:13px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){
  .app-header{padding:10px 12px;gap:8px}
  .logo-title{font-size:18px}
  .hymn-count{display:none}
}
</style>
</head>
<body>

<div id="sync-banner"><div class="sync-spinner"></div><span id="sync-msg">Syncing hymn library…</span></div>
<header class="app-header">
  <div class="logo" onclick="location.reload()" style="cursor:pointer">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
    <span class="logo-title">Lyric Hub</span>
  </div>
  <div class="header-right">
    <span class="hymn-count" id="hymn-count">0 hymns</span>
    <button id="theme-toggle" class="btn btn-ghost" title="Toggle Dark/Light Mode">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707"/></svg>
    </button>
    <button class="btn btn-amber" id="backup-btn"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>Backup</button>
    <button class="btn btn-blue" id="rep-btn"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Repertoires</button>
    <button class="btn btn-teal" id="app-info-btn"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4m0-4h.01"/></svg>Info</button>
  </div>
</header>

<div id="home-view">
  <div id="banner-section">
    <div class="banner-ratio" id="banner-ratio">
      <button class="banner-nav banner-prev" id="banner-prev"><svg viewBox="0 0 24 24" stroke-width="2.5"><path d="M15 19l-7-7 7-7"/></svg></button>
      <button class="banner-nav banner-next" id="banner-next"><svg viewBox="0 0 24 24" stroke-width="2.5"><path d="M9 5l7 7-7 7"/></svg></button>
      <div class="banner-dots" id="banner-dots"></div>
    </div>
  </div>
  <div class="home-toolbar">
    <h2>Hymn Books</h2>
  </div>
  <div id="donate-home-card" style="margin:0 24px 20px;"></div>
  <div class="book-grid" id="book-grid"></div>
  <footer><p>Lyric Hub &middot; SDA Music Realm</p></footer>
</div>

<div class="modal-overlay" id="history-modal" style="z-index: 260;">
  <div class="modal-box wide">
    <button class="modal-close" id="close-history-modal"><svg viewBox="0 0 24 24" stroke-width="2.5"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
    <h2 class="modal-title">Service history</h2>
    <p class="modal-sub">Shows Hymn Number and Language of projected items</p>
    <div id="history-list" style="max-height:420px;overflow-y:auto;-webkit-overflow-scrolling:touch"></div>
  </div>
</div>

<script>
// --- CORE DATA & STATE ---
let hymns=[], repertoires=[], repItems=[], bannerSlides=[], serviceHistory=[];

// --- DARK MODE LOGIC ---
const themeToggle = document.getElementById('theme-toggle');
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('lh_theme', theme);
}
themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(current === 'dark' ? 'light' : 'dark');
});
applyTheme(localStorage.getItem('lh_theme') || 'light');

// --- UPDATED SERVICE HISTORY LOGIC ---
function renderHistoryList(){
  const list = document.getElementById('history-list');
  if(!serviceHistory.length) {
    list.innerHTML = '<p style="text-align:center; color:var(--text3); padding:20px;">No history yet.</p>';
    return;
  }
  
  list.innerHTML = serviceHistory.map(h => {
    const d = new Date(h.projectedAt).toLocaleDateString('en-ZA', {weekday:'short', year:'numeric', month:'short', day:'numeric'});
    
    // Instead of repertoire name, we map through the specific hymn numbers and languages
    const hymnDetails = (h.hymnItems || []).map(item => {
        return `<span style="display:inline-block; background:var(--accent-light); color:var(--accent2); padding:2px 6px; border-radius:4px; font-size:11px; margin-right:4px; margin-bottom:4px;">#${item.number} (${item.language})</span>`;
    }).join('');

    return `<div style="padding:12px; background:var(--bg2); border:1px solid var(--border); border-radius:10px; margin-bottom:8px">
      <div style="font-weight:700; font-size:14px; color:var(--text); margin-bottom:4px;">${escHtml(h.repName)}</div>
      <div style="font-size:11px; color:var(--text3); margin-bottom:8px;">${d}</div>
      <div style="display:flex; flex-wrap:wrap;">
        ${hymnDetails || '<span style="font-size:11px; font-style:italic; color:var(--text4);">No hymns recorded</span>'}
      </div>
    </div>`;
  }).join('');
}

// --- MOBILE SPEED & SYNC OPTIMIZATION ---
async function syncHymnsFromGithub(){
  const banner = document.getElementById('sync-banner');
  banner.classList.add('show');
  try{
    const res = await fetch('https://raw.githubusercontent.com/katskm90-bit/lyric-hub/main/hymns.json?t=' + Date.now());
    const data = await res.json();
    hymns = data.hymns || [];
    bannerSlides = data.bannerSlides || [];
    renderBookGrid();
    renderBanner();
    document.getElementById('hymn-count').textContent = hymns.length + ' hymns';
    setTimeout(() => banner.classList.remove('show'), 2000);
  } catch(e) {
    document.getElementById('sync-msg').textContent = "Offline mode - data cached.";
    setTimeout(() => banner.classList.remove('show'), 3000);
  }
}

// Initial Load
window.addEventListener('load', () => {
  // Sync immediately
  syncHymnsFromGithub();
  // Secondary sync in background after 5s to ensure stability
  setTimeout(syncHymnsFromGithub, 5000);
});

// Helper for HTML escaping
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ... INCLUDE ALL OTHER ORIGINAL JAVASCRIPT FUNCTIONS (Projection, Add, Repertoire, etc.) ... */

</script>
</body>
</html>
